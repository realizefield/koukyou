<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>公共　学習単元表　— 江原予備校</title>
<link href="https://fonts.googleapis.com/css2?family=BIZ+UDGothic:wght@400;700&display=swap" rel="stylesheet">
<style>
:root{
  --ink:#1a2236;--paper:#f5f3ee;--card:#fffefb;
  --gold:#c8972a;--gold2:#f0c040;--red:#b83232;
  --blue:#1e4d8c;--green:#1e7a4a;--muted:#7a8299;
  --border:#ddd8cc;
  --A:#27ae60;--B:#2980b9;--C:#e67e22;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'BIZ UDGothic','Meiryo',sans-serif;background:var(--paper);color:var(--ink);font-size:15px;min-height:100vh}

/* ━━━ ヘッダー ━━━ */
.hdr{background:var(--ink);color:#fff;padding:0 20px;height:56px;display:flex;align-items:center;justify-content:space-between;box-shadow:0 3px 14px rgba(0,0,0,.4)}
.hdr-left h1{font-size:1.05em;font-weight:700;letter-spacing:.04em}
.hdr-left p{font-size:.7em;opacity:.55;letter-spacing:.1em;margin-top:1px}
.streak-badge{display:flex;align-items:center;gap:8px;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.25);border-radius:20px;padding:6px 14px}
.streak-badge .flame{font-size:1.3em}
.streak-badge .days{font-size:.78em;font-weight:700;color:var(--gold2)}

/* ━━━ サマリーバー ━━━ */
.summary-bar{background:#253060;padding:12px 20px;display:flex;gap:20px;align-items:center;flex-wrap:wrap;border-bottom:2px solid var(--gold)}
.sbar-item{display:flex;flex-direction:column;align-items:center;gap:2px}
.sbar-num{font-size:1.4em;font-weight:700;color:var(--gold2);font-variant-numeric:tabular-nums}
.sbar-lbl{font-size:.68em;color:rgba(255,255,255,.65);letter-spacing:.06em}
.sbar-div{width:1px;background:rgba(255,255,255,.2);height:36px;margin:0 4px}
.progress-wrap{flex:1;min-width:200px}
.progress-lbl{font-size:.7em;color:rgba(255,255,255,.65);margin-bottom:4px}
.progress-bar{background:rgba(255,255,255,.15);border-radius:20px;height:10px;overflow:hidden}
.progress-fill{background:linear-gradient(90deg,var(--gold),var(--gold2));height:100%;border-radius:20px;transition:.5s}
.progress-pct{font-size:.72em;color:var(--gold2);margin-top:3px;font-weight:700}

/* ━━━ メイン ━━━ */
.main{max-width:900px;margin:24px auto;padding:0 14px 60px}

/* ━━━ 大カテゴリ ━━━ */
.cat-section{margin-bottom:32px}
.cat-header{display:flex;align-items:center;gap:12px;margin-bottom:14px}
.cat-bar{width:5px;border-radius:3px;height:32px;flex-shrink:0}
.cat-bar.seimei{background:var(--blue)}
.cat-bar.seiyou{background:var(--red)}
.cat-title{font-size:1.1em;font-weight:700;letter-spacing:.04em}
.cat-count{font-size:.78em;color:var(--muted);margin-left:auto;font-weight:700}

/* ━━━ 単元カード ━━━ */
.unit-card{background:var(--card);border:1px solid var(--border);border-radius:10px;margin-bottom:10px;overflow:hidden;box-shadow:0 2px 8px rgba(0,0,0,.05);transition:.15s}
.unit-card:hover{box-shadow:0 4px 16px rgba(0,0,0,.1);transform:translateY(-1px)}
.unit-top{display:flex;align-items:center;gap:12px;padding:13px 16px}
.unit-num{width:30px;height:30px;border-radius:50%;background:var(--blue);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:.82em;flex-shrink:0}
.unit-num.red{background:var(--red)}
.unit-title{flex:1;font-size:.95em;font-weight:700;line-height:1.35}
.unit-type{font-size:.68em;padding:2px 8px;border-radius:10px;font-weight:700;flex-shrink:0;letter-spacing:.04em}
.type-main{background:#e8f0ff;color:var(--blue)}
.type-quiz{background:#fde8e8;color:var(--red)}

/* 理解度 ABC */
.abc-row{display:flex;gap:6px;padding:0 16px 12px;align-items:center}
.abc-lbl{font-size:.72em;color:var(--muted);font-weight:700;margin-right:4px;letter-spacing:.06em}
.abc-btn{width:34px;height:28px;border:2px solid var(--border);border-radius:6px;font-family:'BIZ UDGothic',sans-serif;font-weight:700;font-size:.82em;background:#f5f5f5;color:var(--muted);cursor:pointer;transition:.15s;flex-shrink:0}
.abc-btn:hover{border-color:var(--muted)}
.abc-btn.A{background:var(--A);color:#fff;border-color:var(--A)}
.abc-btn.B{background:var(--B);color:#fff;border-color:var(--B)}
.abc-btn.C{background:var(--C);color:#fff;border-color:var(--C)}

/* 学習回数・最終日 */
.stat-row{display:flex;gap:14px;padding:0 16px 10px;align-items:center;flex-wrap:wrap}
.stat-item{display:flex;align-items:center;gap:4px;font-size:.76em;color:var(--muted)}
.stat-item .val{font-weight:700;color:var(--ink)}
.repeat-dots{display:flex;gap:3px}
.dot{width:9px;height:9px;border-radius:50%;background:var(--border)}
.dot.done{background:var(--gold)}
.dot.done.perfect{background:var(--green)}

/* リンク行 */
.link-row{display:flex;gap:8px;padding:0 16px 14px;flex-wrap:wrap}
.page-link{text-decoration:none;font-family:'BIZ UDGothic',sans-serif;font-size:.8em;font-weight:700;padding:6px 14px;border-radius:6px;border:1.5px solid var(--border);color:var(--ink);background:#f8f8f8;transition:.13s;display:flex;align-items:center;gap:5px}
.page-link:hover{background:var(--blue);color:#fff;border-color:var(--blue)}
.page-link.main-link{background:var(--blue);color:#fff;border-color:var(--blue)}
.page-link.main-link:hover{background:#163d73}

/* ━━━ 達成バッジエリア ━━━ */
.badge-section{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:18px 20px;margin-bottom:24px;box-shadow:0 2px 8px rgba(0,0,0,.05)}
.badge-title{font-size:.82em;font-weight:700;color:var(--muted);letter-spacing:.1em;margin-bottom:12px}
.badges{display:flex;flex-wrap:wrap;gap:10px}
.badge{display:flex;flex-direction:column;align-items:center;gap:4px;padding:10px 14px;border-radius:8px;border:2px solid var(--border);background:#f8f8f8;min-width:80px;transition:.2s}
.badge.earned{border-color:var(--gold);background:linear-gradient(135deg,#fffbea,#fff8d0);box-shadow:0 2px 8px rgba(200,151,42,.2)}
.badge.locked{opacity:.35;filter:grayscale(1)}
.badge-icon{font-size:1.6em}
.badge-name{font-size:.68em;font-weight:700;color:var(--ink);text-align:center;line-height:1.3}

/* ━━━ 連続学習カレンダー ━━━ */
.cal-section{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:18px 20px;margin-bottom:24px;box-shadow:0 2px 8px rgba(0,0,0,.05)}
.cal-title{font-size:.82em;font-weight:700;color:var(--muted);letter-spacing:.1em;margin-bottom:12px}
.cal-grid{display:flex;flex-wrap:wrap;gap:4px}
.cal-day{width:16px;height:16px;border-radius:3px;background:var(--border)}
.cal-day.s1{background:#c6e48b}
.cal-day.s2{background:#7bc96f}
.cal-day.s3{background:#239a3b}
.cal-day.s4{background:#196127}
.cal-lbl{display:flex;gap:6px;align-items:center;margin-top:8px;font-size:.7em;color:var(--muted)}
.cal-lbl-dot{width:12px;height:12px;border-radius:2px}

/* ━━━ モーダル（達成！） ━━━ */
.achieve-modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:900;align-items:center;justify-content:center}
.achieve-modal.open{display:flex}
.achieve-box{background:#fff;border-radius:18px;padding:36px 40px;text-align:center;max-width:360px;width:90%;box-shadow:0 12px 48px rgba(0,0,0,.3);position:relative;overflow:hidden}
.achieve-box::before{content:'';position:absolute;top:0;left:0;right:0;height:5px;background:linear-gradient(90deg,var(--gold),var(--gold2),var(--gold))}
.achieve-emoji{font-size:3em;margin-bottom:10px}
.achieve-title{font-size:1.3em;font-weight:700;margin-bottom:8px;color:var(--ink)}
.achieve-sub{font-size:.88em;color:var(--muted);margin-bottom:20px;line-height:1.6}
.achieve-close{font-family:'BIZ UDGothic',sans-serif;font-size:.9em;font-weight:700;background:var(--blue);color:#fff;border:none;border-radius:8px;padding:10px 28px;cursor:pointer}

#cnv{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:9999}
</style>
</head>
<body>
<canvas id="cnv"></canvas>

<!-- ヘッダー -->
<header class="hdr">
  <div class="hdr-left">
    <h1>公共　学習単元表</h1>
    <p>江原予備校</p>
  </div>
  <div class="streak-badge">
    <span class="flame">🔥</span>
    <span class="days" id="streakDisp">0日連続</span>
  </div>
</header>

<!-- サマリーバー -->
<div class="summary-bar">
  <div class="sbar-item"><div class="sbar-num" id="sumTotal">0</div><div class="sbar-lbl">総学習回数</div></div>
  <div class="sbar-div"></div>
  <div class="sbar-item"><div class="sbar-num" id="sumA">0</div><div class="sbar-lbl">理解A（完璧）</div></div>
  <div class="sbar-item"><div class="sbar-num" id="sumB">0</div><div class="sbar-lbl">理解B（良好）</div></div>
  <div class="sbar-item"><div class="sbar-num" id="sumC">0</div><div class="sbar-lbl">理解C（要復習）</div></div>
  <div class="sbar-div"></div>
  <div class="progress-wrap">
    <div class="progress-lbl">全単元の習熟度</div>
    <div class="progress-bar"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
    <div class="progress-pct" id="progressPct">0%</div>
  </div>
</div>

<div class="main">

<!-- 達成バッジ -->
<div class="badge-section">
  <div class="badge-title">🏅 達成バッジ</div>
  <div class="badges" id="badgeArea"></div>
</div>

<!-- 学習カレンダー -->
<div class="cal-section">
  <div class="cal-title">📅 学習カレンダー（過去84日）</div>
  <div class="cal-grid" id="calGrid"></div>
  <div class="cal-lbl">
    <span>少</span>
    <div class="cal-lbl-dot" style="background:var(--border)"></div>
    <div class="cal-lbl-dot cal-day s1"></div>
    <div class="cal-lbl-dot cal-day s2"></div>
    <div class="cal-lbl-dot cal-day s3"></div>
    <div class="cal-lbl-dot cal-day s4"></div>
    <span>多</span>
  </div>
</div>

<!-- ━━━ 青年期 ━━━ -->
<div class="cat-section">
  <div class="cat-header">
    <div class="cat-bar seimei"></div>
    <div class="cat-title">青年期と自己形成</div>
    <div class="cat-count" id="cnt-seimei"></div>
  </div>

  <!-- ① 青年の生き方 -->
  <div class="unit-card" id="uc-koukyo1">
    <div class="unit-top">
      <div class="unit-num">①</div>
      <div class="unit-title">青年の生き方</div>
      <span class="unit-type type-main">本編</span>
    </div>
    <div class="abc-row">
      <span class="abc-lbl">理解度</span>
      <button class="abc-btn" data-id="koukyo1" data-grade="A" onclick="setGrade(this)">A</button>
      <button class="abc-btn" data-id="koukyo1" data-grade="B" onclick="setGrade(this)">B</button>
      <button class="abc-btn" data-id="koukyo1" data-grade="C" onclick="setGrade(this)">C</button>
    </div>
    <div class="stat-row">
      <div class="stat-item">学習回数：<span class="val" id="cnt-koukyo1">0</span>回</div>
      <div class="repeat-dots" id="dots-koukyo1"></div>
      <div class="stat-item">最終：<span class="val" id="last-koukyo1">—</span></div>
    </div>
    <div class="link-row">
      <a class="page-link main-link" href="koukyo1.html">📖 本編を開く</a>
      <a class="page-link" href="koukyo1-1.html">✏️ 練習問題</a>
    </div>
  </div>

  <!-- ② 発達課題と欲求 -->
  <div class="unit-card" id="uc-koukyo2">
    <div class="unit-top">
      <div class="unit-num">②</div>
      <div class="unit-title">発達課題と欲求（ハヴィガースト・エリクソン・マズロー）</div>
      <span class="unit-type type-main">本編</span>
    </div>
    <div class="abc-row">
      <span class="abc-lbl">理解度</span>
      <button class="abc-btn" data-id="koukyo2" data-grade="A" onclick="setGrade(this)">A</button>
      <button class="abc-btn" data-id="koukyo2" data-grade="B" onclick="setGrade(this)">B</button>
      <button class="abc-btn" data-id="koukyo2" data-grade="C" onclick="setGrade(this)">C</button>
    </div>
    <div class="stat-row">
      <div class="stat-item">学習回数：<span class="val" id="cnt-koukyo2">0</span>回</div>
      <div class="repeat-dots" id="dots-koukyo2"></div>
      <div class="stat-item">最終：<span class="val" id="last-koukyo2">—</span></div>
    </div>
    <div class="link-row">
      <a class="page-link main-link" href="koukyo2.html">📖 本編を開く</a>
      <a class="page-link" href="koukyo2-1.html">✏️ 練習問題</a>
      <a class="page-link" href="koukyo3.html">📝 マズロー練習</a>
    </div>
  </div>
</div>

<!-- ━━━ 西洋哲学 ━━━ -->
<div class="cat-section">
  <div class="cat-header">
    <div class="cat-bar seiyou"></div>
    <div class="cat-title">西洋哲学</div>
    <div class="cat-count" id="cnt-seiyou"></div>
  </div>

  <!-- seiyou 1~6 -->
  <div id="seiyou-cards"></div>
</div>

</div><!-- /main -->

<!-- 達成モーダル -->
<div class="achieve-modal" id="achieveModal">
  <div class="achieve-box">
    <div class="achieve-emoji" id="achieveEmoji">🎉</div>
    <div class="achieve-title" id="achieveTitle">達成！</div>
    <div class="achieve-sub"  id="achieveSub"></div>
    <button class="achieve-close" onclick="closeAchieve()">とじる</button>
  </div>
</div>

<script>
/* ━━━━━━━━━━━━━━━━━━━━━━━━━━
   単元マスターデータ
━━━━━━━━━━━━━━━━━━━━━━━━━━ */
const SEIYOU_UNITS = [
  {id:'seiyou1', num:'①', title:'古代ギリシア思想',
   links:[{label:'📖 本編を開く', url:'koukyo_seiyou1.html', main:true},{label:'✏️ 練習問題', url:'koukyo_seiyou1.html?mode=quiz', main:false}]},
  {id:'seiyou2', num:'②', title:'経験論・合理論（ベーコン・デカルト）',
   links:[{label:'📖 本編を開く', url:'koukyo_seiyou2.html', main:true},{label:'✏️ 練習問題', url:'koukyo_seiyou2.html?mode=quiz', main:false}]},
  {id:'seiyou3', num:'③', title:'ドイツ観念論（カント・ヘーゲル）',
   links:[{label:'📖 本編を開く', url:'koukyo_seiyou3.html', main:true},{label:'✏️ 練習問題', url:'koukyo_seiyou3.html?mode=quiz', main:false}]},
  {id:'seiyou4', num:'④', title:'功利主義（ベンサム・ミル）',
   links:[{label:'📖 本編を開く', url:'koukyo_seiyou4.html', main:true},{label:'✏️ 練習問題', url:'koukyo_seiyou4.html?mode=quiz', main:false}]},
  {id:'seiyou5', num:'⑤', title:'実存主義（キルケゴール・ニーチェ・サルトル）',
   links:[{label:'📖 本編を開く', url:'koukyo_seiyou5.html', main:true},{label:'✏️ 練習問題', url:'koukyo_seiyou5.html?mode=quiz', main:false}]},
  {id:'seiyou6', num:'⑥', title:'プラグマティズム（パース・ジェームズ・デューイ）',
   links:[{label:'📖 本編を開く', url:'koukyo_seiyou6.html', main:true},{label:'✏️ 練習問題', url:'koukyo_seiyou6.html?mode=quiz', main:false}]},
];

const ALL_UNIT_IDS = ['koukyo1','koukyo2','seiyou1','seiyou2','seiyou3','seiyou4','seiyou5','seiyou6'];

/* ━━━ バッジ定義 ━━━ */
const BADGES = [
  {id:'first',    icon:'🌱', name:'はじめの一歩',  cond: d => getTotalCount(d) >= 1},
  {id:'study5',   icon:'📚', name:'3回学習',        cond: d => getTotalCount(d) >= 3},
  {id:'study20',  icon:'🏃', name:'5回学習',        cond: d => getTotalCount(d) >= 5},
  {id:'study50',  icon:'💪', name:'7回学習',        cond: d => getTotalCount(d) >= 7},
  {id:'allC',     icon:'🗒️', name:'全単元チェック', cond: d => ALL_UNIT_IDS.every(id => getGrade(d,id))},
  {id:'allB',     icon:'⭐', name:'全単元B以上',    cond: d => ALL_UNIT_IDS.every(id => ['A','B'].includes(getGrade(d,id)))},
  {id:'allA',     icon:'👑', name:'全単元A達成',    cond: d => ALL_UNIT_IDS.every(id => getGrade(d,id)==='A')},
  {id:'streak3',  icon:'🔥', name:'3日連続',          cond: d => getStreak() >= 3},
  {id:'streak7',  icon:'🌟', name:'5日連続',          cond: d => getStreak() >= 5},
  {id:'streak30', icon:'🏆', name:'7日連続',          cond: d => getStreak() >= 7},
];

/* ━━━ localStorage キー ━━━ */
const LS_KEY = 'koukyo_index_v1';
const LS_CAL = 'koukyo_calendar_v1';

function loadData(){ try{ return JSON.parse(localStorage.getItem(LS_KEY)||'{}'); }catch(e){ return {}; } }
function saveData(d){ localStorage.setItem(LS_KEY, JSON.stringify(d)); }

function getGrade(d,id){ return d[id+'_grade']||''; }
function getCount(d,id){ return d[id+'_count']||0; }
function getLast(d,id){  return d[id+'_last']||''; }
function getTotalCount(d){ return ALL_UNIT_IDS.reduce((s,id)=>s+getCount(d,id),0); }

/* ━━━ 連続学習日数 ━━━ */
function getTodayStr(){ return new Date().toISOString().slice(0,10); }
function getStreak(){
  const cal = JSON.parse(localStorage.getItem(LS_CAL)||'{}');
  let streak=0, d=new Date();
  for(let i=0;i<365;i++){
    const k=d.toISOString().slice(0,10);
    if(cal[k]) streak++;
    else if(i>0) break;
    d.setDate(d.getDate()-1);
  }
  return streak;
}
function markToday(){
  const cal = JSON.parse(localStorage.getItem(LS_CAL)||'{}');
  cal[getTodayStr()]=(cal[getTodayStr()]||0)+1;
  localStorage.setItem(LS_CAL, JSON.stringify(cal));
}

/* ━━━ 理解度セット ━━━ */
function setGrade(btn){
  const id=btn.dataset.id, grade=btn.dataset.grade;
  const d=loadData();
  const prev=getGrade(d,id);
  // 同じグレードをクリックで解除
  if(prev===grade){ d[id+'_grade']=''; }
  else { d[id+'_grade']=grade; }
  // 学習回数+1（グレード変更のたびにカウント）
  d[id+'_count']=(getCount(d,id)||0)+1;
  d[id+'_last']=getTodayStr();
  saveData(d);
  markToday();
  render();
  // バッジチェック
  checkBadges(d);
}

/* ━━━ 西洋哲学カード生成 ━━━ */
function buildSeiyouCards(){
  const wrap = document.getElementById('seiyou-cards');
  wrap.innerHTML='';
  SEIYOU_UNITS.forEach(u=>{
    wrap.innerHTML += `
    <div class="unit-card" id="uc-${u.id}">
      <div class="unit-top">
        <div class="unit-num red">${u.num}</div>
        <div class="unit-title">${u.title}</div>
        <span class="unit-type type-quiz">説明＋練習</span>
      </div>
      <div class="abc-row">
        <span class="abc-lbl">理解度</span>
        <button class="abc-btn" data-id="${u.id}" data-grade="A" onclick="setGrade(this)">A</button>
        <button class="abc-btn" data-id="${u.id}" data-grade="B" onclick="setGrade(this)">B</button>
        <button class="abc-btn" data-id="${u.id}" data-grade="C" onclick="setGrade(this)">C</button>
      </div>
      <div class="stat-row">
        <div class="stat-item">学習回数：<span class="val" id="cnt-${u.id}">0</span>回</div>
        <div class="repeat-dots" id="dots-${u.id}"></div>
        <div class="stat-item">最終：<span class="val" id="last-${u.id}">—</span></div>
      </div>
      <div class="link-row">
        ${u.links.map(l=>`<a class="page-link${l.main?' main-link':''}" href="${l.url}">${l.label}</a>`).join('')}
      </div>
    </div>`;
  });
}

/* ━━━ 繰り返しドット（最大5個） ━━━ */
function renderDots(id, cnt, grade){
  const el=document.getElementById('dots-'+id);
  if(!el) return;
  const max=7;
  let html='';
  for(let i=0;i<max;i++){
    const done=i<cnt;
    const cls=done?(grade==='A'?'done perfect':'done'):'';
    html+=`<div class="dot ${cls}"></div>`;
  }
  if(cnt>max) html+=`<span style="font-size:.7em;color:var(--muted);margin-left:2px">+${cnt-max}</span>`;
  el.innerHTML=html;
}

/* ━━━ 全体レンダリング ━━━ */
function render(){
  const d=loadData();
  let cntA=0,cntB=0,cntC=0,total=0;

  ALL_UNIT_IDS.forEach(id=>{
    const grade=getGrade(d,id);
    const cnt=getCount(d,id);
    const last=getLast(d,id);
    total+=cnt;
    if(grade==='A') cntA++;
    else if(grade==='B') cntB++;
    else if(grade==='C') cntC++;

    // ABCボタン色
    document.querySelectorAll(`[data-id="${id}"]`).forEach(btn=>{
      btn.className='abc-btn'+(grade===btn.dataset.grade?' '+grade:'');
    });

    // カウント・ドット・最終日
    const ce=document.getElementById('cnt-'+id);
    if(ce) ce.textContent=cnt;
    renderDots(id,cnt,grade);
    const le=document.getElementById('last-'+id);
    if(le) le.textContent=last||'—';

    // カード枠色
    const card=document.getElementById('uc-'+id);
    if(card){
      card.style.borderLeft=grade?`4px solid var(--${grade})`:'';
    }
  });

  // サマリー
  document.getElementById('sumTotal').textContent=total;
  document.getElementById('sumA').textContent=cntA;
  document.getElementById('sumB').textContent=cntB;
  document.getElementById('sumC').textContent=cntC;

  // 進捗バー（A=100%, B=60%, C=30%）
  const pct = Math.round(
    ALL_UNIT_IDS.reduce((s,id)=>{
      const g=getGrade(d,id);
      return s+(g==='A'?100:g==='B'?60:g==='C'?30:0);
    },0)/ALL_UNIT_IDS.length
  );
  document.getElementById('progressFill').style.width=pct+'%';
  document.getElementById('progressPct').textContent=pct+'%';

  // カテゴリ内カウント
  const seiCount=ALL_UNIT_IDS.filter(id=>id.startsWith('seiyou')&&getGrade(d,id)).length;
  const kouCount=ALL_UNIT_IDS.filter(id=>id.startsWith('koukyo')&&getGrade(d,id)).length;
  document.getElementById('cnt-seimei').textContent=`${kouCount}/2単元チェック済`;
  document.getElementById('cnt-seiyou').textContent=`${seiCount}/6単元チェック済`;

  // 連続日数
  document.getElementById('streakDisp').textContent=getStreak()+'日連続';

  // バッジ
  renderBadges(d);

  // カレンダー
  renderCalendar();
}

/* ━━━ バッジレンダリング ━━━ */
function renderBadges(d){
  const area=document.getElementById('badgeArea');
  area.innerHTML=BADGES.map(b=>{
    const earned=b.cond(d);
    return `<div class="badge ${earned?'earned':'locked'}" title="${b.name}">
      <div class="badge-icon">${b.icon}</div>
      <div class="badge-name">${b.name}</div>
    </div>`;
  }).join('');
}

/* ━━━ バッジ取得チェック ━━━ */
function checkBadges(d){
  const prev=JSON.parse(localStorage.getItem('koukyo_badges')||'[]');
  BADGES.forEach(b=>{
    if(!prev.includes(b.id) && b.cond(d)){
      prev.push(b.id);
      localStorage.setItem('koukyo_badges',JSON.stringify(prev));
      showAchieve(b.icon, b.name+'を獲得！', 'おめでとうございます！🎊');
    }
  });
}

/* ━━━ カレンダーレンダリング ━━━ */
function renderCalendar(){
  const cal=JSON.parse(localStorage.getItem(LS_CAL)||'{}');
  const grid=document.getElementById('calGrid');
  let html='';
  for(let i=83;i>=0;i--){
    const d=new Date(); d.setDate(d.getDate()-i);
    const k=d.toISOString().slice(0,10);
    const v=cal[k]||0;
    const cls=v>=4?'s4':v>=3?'s3':v>=2?'s2':v>=1?'s1':'';
    html+=`<div class="cal-day ${cls}" title="${k}：${v}回"></div>`;
  }
  grid.innerHTML=html;
}

/* ━━━ 達成モーダル ━━━ */
function showAchieve(emoji, title, sub){
  document.getElementById('achieveEmoji').textContent=emoji;
  document.getElementById('achieveTitle').textContent=title;
  document.getElementById('achieveSub').textContent=sub;
  document.getElementById('achieveModal').classList.add('open');
  startConf();
  setTimeout(()=>{ stopConf(); }, 4000);
}
function closeAchieve(){
  document.getElementById('achieveModal').classList.remove('open');
  stopConf();
}

/* ━━━ 紙吹雪 ━━━ */
const cv=document.getElementById('cnv'),cx=cv.getContext('2d');
let pts=[],raf=null;
function startConf(){
  cv.width=innerWidth;cv.height=innerHeight;pts=[];
  for(let i=0;i<220;i++)pts.push({x:Math.random()*cv.width,y:Math.random()*cv.height-cv.height,s:Math.random()*10+4,c:`hsl(${Math.random()*360},70%,62%)`,sp:Math.random()*3+2,r:Math.random()*Math.PI*2,dr:.05});
  af();
}
function af(){
  cx.clearRect(0,0,cv.width,cv.height);
  pts.forEach(p=>{p.y+=p.sp;p.r+=p.dr;cx.save();cx.translate(p.x,p.y);cx.rotate(p.r);cx.fillStyle=p.c;cx.fillRect(-p.s/2,-p.s/2,p.s,p.s);cx.restore();if(p.y>cv.height)p.y=-20;});
  raf=requestAnimationFrame(af);
}
function stopConf(){if(raf){cancelAnimationFrame(raf);raf=null;}cx.clearRect(0,0,cv.width,cv.height);pts=[];}

/* ━━━ 初期化 ━━━ */
buildSeiyouCards();
render();
</script>
